# M2机械臂参数

# 关节运动速度 0-4000
M2_speed: 100
# 关节运动加速度 0-400
M2_acc: 60
# 机械臂复现动作的记录频率，hz
Record_rate: 5.0
# 机械臂设备串口号
M2_serial: "/dev/ttyUSB1"
# 订阅姿态给定值的话题2
M2_sub_coord_topic: "/arm_coord"
# 订阅机械臂动作值的话题名
M2_sub_cmd_topic: "/arm_cmd"
# 发布机械臂各关节角度值的话题名
M2_pub_pose: "/arm_pose"
# 发布末端关节x y z t的坐标话题
M2_pose_XYZT: "/M2_pose_XYZT"
# 发布各个关节力矩大小数组
M2_torque_topic: "/M2_torque"
# 动作之间的延时
arm_delay_time: 1.5
# 可存储的机械臂动作组个数
arm_move: 15
# 每一个机械臂动作组的位置个数
M2_trajectory: 10
#已经记录的即将要复现的轨迹数组个数
M2_target_num: [2,2,2,5,2,5,4,4,4,4,2,5,2,5,3]
